version: "3.8"

services:
  # ── MySQL Database ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: niveshtrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Nitish12345
      MYSQL_DATABASE: niveshtrack_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - niveshtrack-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend (Portfolio API) ────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: niveshtrack-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/niveshtrack_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      DB_USERNAME: root
      DB_PASSWORD: Nitish12345
      JWT_SECRET: bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25OaXZlc2hUcmFja1BvcnRmb2xpb0FwcDIwMjQ=
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - niveshtrack-network

  # ── AppInfo Microservice ───────────────────────────────────────
  appinfo:
    build:
      context: ./AppInfo
      dockerfile: Dockerfile
    container_name: niveshtrack-appinfo
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      CORS_ORIGINS: http://localhost,http://localhost:8080,http://localhost:5173
    networks:
      - niveshtrack-network

  # ── Frontend (React + Nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./Portfolio
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8081
        VITE_APPINFO_BASE_URL: http://localhost:8082
    container_name: niveshtrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - appinfo
    networks:
      - niveshtrack-network

networks:
  niveshtrack-network:
    driver: bridge

volumes:
  mysql_data:
